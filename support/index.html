<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Way Support - Abéllha OS</title>
    <style>
        body { 
            background: #0d0d0d; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .container { text-align: center; }
        .status-text { font-size: 1.2rem; margin-top: 20px; color: #ff4500; } /* Orange accent */
    </style>
    
    <script type="text/javascript">
      window.$crisp=[];window.CRISP_WEBSITE_ID="YOUR_WEBSITE_ID_HERE";
      (function(){d=document;s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();
      
      // Auto-open chat on load
      $crisp.push(["do", "chat:open"])
    </script>
</head>
<body>
    <div class="container">
        <h2>Connecting to Milky Way Command Center...</h2>
        <p class="status-text">Devs are standing by.</p>
    </div>
</body>
</html>
