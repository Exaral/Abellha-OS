<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Devs | Abéllha OS Milky Way</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #ff4500; /* Your orange/red theme color */
        }
        body {
            margin: 0;
            background: #050505; /* Deep Space Black */
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .support-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { color: #aaa; line-height: 1.6; }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        /* Crisp/Tawk Button Customization can go here */
    </style>
    
    </head>
<body>
    <div class="support-card">
        <div class="status-badge">● Systems Operational</div>
        <h1>Abéllha OS Support</h1>
        <p>You are now connected to the <b>Milky Way</b> developer portal. Please wait for a developer to join the session.</p>
        <p style="font-size: 0.9rem;">Response times may vary depending on the galaxy's traffic.</p>
    </div>
</body>
</html>
